worker_processes auto;

events {
    worker_connections 1024;
}

# HTTP-only config used during initial SSL certificate issuance.
# After certbot issues the cert, deploy.sh replaces this with nginx.conf.
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'POS System — SSL setup in progress';
            add_header Content-Type text/plain;
        }
    }
}
